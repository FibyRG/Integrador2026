<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1B4965"/>
  
  <!-- Bicycle wheel (left) -->
  <circle cx="18" cy="34" r="8" stroke="#FFFFFF" stroke-width="1.8" fill="none"/>
  <circle cx="18" cy="34" r="1.2" fill="#FFFFFF"/>
  
  <!-- Bicycle wheel (right) -->
  <circle cx="38" cy="34" r="8" stroke="#FFFFFF" stroke-width="1.8" fill="none"/>
  <circle cx="38" cy="34" r="1.2" fill="#FFFFFF"/>
  
  <!-- Frame -->
  <polyline points="18,34 28,24 38,34" stroke="#F2A900" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  <line x1="28" y1="24" x2="28" y2="34" stroke="#F2A900" stroke-width="1.8"/>
  <line x1="28" y1="34" x2="18" y2="34" stroke="#F2A900" stroke-width="1.8"/>
  
  <!-- Handlebars -->
  <line x1="28" y1="24" x2="24" y2="20" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Seat -->
  <ellipse cx="29.5" cy="21" rx="2.5" ry="1" fill="#FFFFFF"/>
  
  <!-- Cathedral silhouette -->
  <path d="M42,16 L42,34 L43.5,34 L43.5,20 L45.5,20 L45.5,34 L47.5,34 L47.5,22 L50,14 L52.5,22 L52.5,34 L54.5,34 L54.5,20 L56.5,20 L56.5,34 L58,34 L58,16 Z" fill="#F2A900" opacity="0.9"/>
  <!-- Cross -->
  <line x1="50" y1="10" x2="50" y2="13" stroke="#F2A900" stroke-width="1.2"/>
  <line x1="48.5" y1="11.2" x2="51.5" y2="11.2" stroke="#F2A900" stroke-width="1.2"/>
  
  <!-- Volcano -->
  <path d="M42,34 L47,22 L50,27 L55,18 L59,26 L62,34 Z" fill="#2D6A4F" opacity="0.85"/>
</svg>